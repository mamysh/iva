name: Resource baseline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Capture sanitized local-profile baseline
        run: npm run baseline:resources -- --json > "$RUNNER_TEMP/resource-baseline.json"

      - name: Upload baseline report
        uses: actions/upload-artifact@v7
        with:
          name: iva-resource-baseline-${{ github.sha }}
          path: ${{ runner.temp }}/resource-baseline.json
          retention-days: 30
