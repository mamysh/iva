name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-profiles:
    name: Build (${{ matrix.profile.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: local
            selector: local
          - name: PostgreSQL
            selector: "@workflow/world-postgres"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build and validate profile descriptor
        env:
          WORKFLOW_TARGET_WORLD: ${{ matrix.profile.selector }}
        run: npm run build && node scripts/start.mjs --check-profile

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run pull-request gate
        run: npm run verify:pr

      - name: Run isolated local replica smoke
        run: npm run replica:local

      - name: Run clean-install and reinstall smoke
        run: npm run replica:install
