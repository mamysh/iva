name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres-peer-profile:
    name: PostgreSQL peer profile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Prepare profile twice with the runner service user
        run: node scripts/postgres-profile.mjs prepare && node scripts/postgres-profile.mjs prepare && test "$(stat -c %a deploy/iva-workflow.environment)" = 600

  postgres-replica:
    name: PostgreSQL replica
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: iva_fixture
          POSTGRES_PASSWORD: synthetic-fixture-password
          POSTGRES_DB: iva_workflow_fixture
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U iva_fixture -d iva_workflow_fixture"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run isolated PostgreSQL replica
        env:
          POSTGRES_FIXTURE_URL: postgresql://iva_fixture:synthetic-fixture-password@127.0.0.1:${{ job.services.postgres.ports[5432] }}/iva_workflow_fixture
        run: npm run replica:postgres

  build-profiles:
    name: Build (${{ matrix.profile.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: local
            selector: local
          - name: PostgreSQL
            selector: "@workflow/world-postgres"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build and validate profile descriptor
        env:
          WORKFLOW_TARGET_WORLD: ${{ matrix.profile.selector }}
        run: npm run build && node scripts/start.mjs --check-profile

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run pull-request gate
        run: npm run verify:pr

      - name: Run isolated local replica smoke
        run: npm run replica:local

      - name: Run clean-install and reinstall smoke
        run: npm run replica:install
