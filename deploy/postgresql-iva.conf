# PostgreSQL 16 profile for Iva's 1 vCPU / 1 GiB VPS.
# Installed as /etc/postgresql/16/main/conf.d/iva.conf.

listen_addresses = '127.0.0.1'
max_connections = 30

shared_buffers = 64MB
effective_cache_size = 256MB
work_mem = 2MB
maintenance_work_mem = 32MB

wal_compression = on
max_wal_size = 256MB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# Small workflow queries do not benefit from LLVM compilation overhead.
jit = off

# Keep slow-query evidence without logging every workflow operation.
log_min_duration_statement = 1000
